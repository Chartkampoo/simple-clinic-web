<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าต่างแพทย์ | ClinicPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'K2D', sans-serif;
            background-color: #f8fafc;
        }

        .glass-nav {
            background: #ffffff;
            border-bottom: 2px solid #f1f5f9;
        }

        .sidebar-link.active {
            background: #eff6ff;
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }

        .btn-primary {
            background: #2563eb;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-link {
            transition: background 0.2s;
        }

        .nav-link:hover:not(.active) {
            background: #f8fafc;
        }
    </style>
</head>

<body class="flex min-h-screen">
    <!-- ส่วนคลุมพื้นหลัง Sidebar สำหรับมือถือ (Sidebar Overlay for Mobile) -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"
        class="fixed inset-0 bg-slate-900/50 z-30 hidden lg:hidden transition-opacity"></div>

    <!-- แถบเมนูข้าง (Sidebar) -->
    <aside id="sidebar"
        class="fixed inset-y-0 left-0 bg-white border-r border-slate-200 z-40 w-64 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 flex items-center justify-between text-blue-600 border-b border-slate-100">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-blue-50 rounded-lg">
                    <i data-lucide="cross" class="w-6 h-6 text-blue-600"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900">ClinicPro</span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-400 hover:text-slate-600">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- ส่วนข้อมูลโปรไฟล์ในแถบเมนูข้าง (Sidebar Profile) -->
        <div class="p-6 border-b border-slate-50 bg-slate-50/50">
            <div class="flex flex-col items-center text-center">
                <div class="relative mb-3">
                    <img src="img/default-doctor.png" alt="Doctor Profile" id="sidebar-avatar"
                        class="w-20 h-20 rounded-2xl object-cover shadow-xl border-4 border-white">
                    <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-500 border-4 border-white rounded-full">
                    </div>
                </div>
                <h3 id="sidebar-user-name" class="font-bold text-slate-900 leading-tight">...</h3>
                </p>
                <!-- ตำแหน่งงานหลัก -->
                <p id="sidebar-specialization" class="text-xs font-bold text-indigo-600 mt-1 uppercase tracking-wider">
                    อายุรแพทย์ (General Doctor)</p>
                <!-- ข้อมูลเพิ่มเติมพร้อมไอคอน -->
                <div class="mt-3 space-y-2">
                    <div
                        class="flex items-center gap-2 text-[10px] font-bold text-slate-400 bg-white px-2 py-1 rounded-lg border border-slate-100 italic">
                        <i data-lucide="award" class="w-3 h-3 text-indigo-500"></i>
                        <span id="sidebar-experience-title">ผู้เชี่ยวชาญการรักษาโรคทั่วไป</span>
                    </div>
                    <div
                        class="flex items-center gap-2 text-[10px] font-bold text-slate-400 bg-white px-2 py-1 rounded-lg border border-slate-100 italic">
                        <i data-lucide="check-circle" class="w-3 h-3 text-indigo-500"></i>
                        <span id="sidebar-experience-years">ประสบการณ์ 10+ ปี</span>
                    </div>
                </div>

                <!-- ปุ่มแก้ไขข้อมูลส่วนตัว (Edit Profile Button) -->
                <button onclick="openEditProfile()"
                    class="mt-4 px-4 py-1.5 text-xs font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-full transition-colors flex items-center gap-2">
                    <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                    แก้ไขข้อมูลส่วนตัว
                </button>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-2 mt-2">
            <button onclick="router.switch('overview'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all active">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="font-medium">ภาพรวมระบบ</span>
            </button>
            <button onclick="router.switch('appointments'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="font-medium">ตารางนัดหมายวันนี้</span>
            </button>
            <button onclick="router.switch('next_appointments'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
                <i data-lucide="calendar-plus" class="w-5 h-5"></i>
                <span class="font-medium">นัดหมายถัดไป</span>
            </button>
            <button onclick="router.switch('patients'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="font-medium">ประวัติผู้ป่วย</span>
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <button onclick="logout()"
                class="flex items-center gap-3 w-full p-3 text-slate-600 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span class="font-medium">ออกจากระบบ</span>
            </button>
        </div>
    </aside>

    <!-- เนื้อหาหลัก (Main Content) -->
    <main class="flex-1 flex flex-col min-w-0">
        <header
            class="h-16 glass-nav sticky top-0 z-30 border-b border-slate-200 px-4 lg:px-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="lg:hidden p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 id="view-title" class="text-lg lg:text-xl font-semibold text-slate-800 truncate">
                    ระบบจัดการสำหรับแพทย์</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:block text-right">
                    <p id="user-name" class="text-sm font-semibold text-slate-900">กำลังโหลด...</p>
                    <span
                        class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase">แพทย์</span>
                </div>
                <div class="relative">
                    <img src="img/default-doctor.png" alt="Avatar"
                        class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover" id="user-avatar">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full">
                    </div>
                </div>
            </div>
        </header>

        <section id="content-area" class="p-6">
            <!-- พื้นที่สำหรับแสดงเนื้อหาที่จะถูกฉีดเข้ามา (Content injected here) -->
        </section>
    </main>

    <!-- สคริปต์ต่างๆ สำหรับการแสดงผล (UI Scripts) -->
    <script src="../js/api.js"></script>
    <script src="../js/ui-helpers.js"></script>
    <script src="js/doctor.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'DOCTOR') window.location.href = '../index.html';

        document.getElementById('user-name').textContent = user.fullName;
        document.getElementById('sidebar-user-name').textContent = user.fullName;

        // อัปเดตข้อมูลคุณหมอในแถบเมนูข้าง
        if (user.specialization) document.getElementById('sidebar-specialization').textContent = user.specialization;
        if (user.experience) {
            const [title, years] = user.experience.split('|');
            if (title) document.getElementById('sidebar-experience-title').textContent = title;
            if (years) document.getElementById('sidebar-experience-years').textContent = years;
        }

        // จัดการรูปโปรไฟล์ตามข้อมูลผู้ใช้ (Dynamic Profile Picture)
        // หากผู้ใช้มีรูปโปรไฟล์ที่เก็บไว้ในฐานข้อมูลให้เลือกใช้รูปนั้น 
        // หากไม่มี จะพยายามค้นหารูปภาพตาม ID ของผู้ใช้ (เช่น doctor-1.png)
        // สุดท้ายหากไม่พบเลยจะใช้รูปภาพพื้นฐาน (default-doctor.png)
        const userAvatar = document.getElementById('user-avatar');
        const sidebarAvatar = document.getElementById('sidebar-avatar');

        const profileImgPath = user.profilePicture || `img/doctor-${user.id}.png`;

        // ใช้รูปสำรองเพื่อตรวจสอบเข้าเช็คว่าไฟล์รูปภาพของคุณหมอมีอยู่จริงหรือไม่ (Check if image exists)
        const tempImg = new Image();
        tempImg.src = profileImgPath;
        tempImg.onload = () => {
            userAvatar.src = profileImgPath;
            sidebarAvatar.src = profileImgPath;
        };
        tempImg.onerror = () => {
            // หากไม่พบรูปเฉพาะของคุณหมอ ให้แสดงรูปภาพพื้นฐาน (Fallback to default)
            userAvatar.src = 'img/default-doctor.png';
            sidebarAvatar.src = 'img/default-doctor.png';
        };

        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = typeof force === 'boolean' ? force : sidebar.classList.contains('-translate-x-full');

            if (isOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../index.html';
        }
        lucide.createIcons();
    </script>
</body>

</html>
