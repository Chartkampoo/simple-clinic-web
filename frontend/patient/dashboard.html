<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าต่างผู้ป่วย | ClinicPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'K2D', sans-serif;
            background-color: #f8fafc;
        }

        .glass-nav {
            background: #ffffff;
            border-bottom: 2px solid #f1f5f9;
        }

        .sidebar-link.active {
            background: #eef2ff;
            color: #4f46e5;
            border-right: 4px solid #4f46e5;
        }

        .btn-indigo {
            background: #4f46e5;
            transition: all 0.2s;
        }

        .btn-indigo:hover {
            background: #4338ca;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-link {
            transition: background 0.2s ease;
        }

        .nav-link:hover:not(.active) {
            background: #f8fafc;
        }
    </style>
</head>

<body class="flex min-h-screen">
    <!-- ส่วนคลุมพื้นหลัง Sidebar สำหรับมือถือ (Sidebar Overlay for Mobile) -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"
        class="fixed inset-0 bg-slate-900/50 z-30 hidden lg:hidden transition-opacity"></div>

    <!-- แถบเมนูข้าง (Sidebar) -->
    <aside id="sidebar"
        class="fixed inset-y-0 left-0 bg-white border-r border-slate-200 z-40 w-64 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 flex items-center justify-between text-indigo-600 border-b border-slate-100">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-indigo-50 rounded-lg">
                    <i data-lucide="cross" class="w-6 h-6 text-indigo-600"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900">ClinicPro</span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-400 hover:text-slate-600">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- ส่วนข้อมูลโปรไฟล์ในแถบเมนูข้าง (Sidebar Profile) -->
        <div class="p-6 border-b border-slate-50 bg-indigo-50/30">
            <div class="flex flex-col items-center text-center">
                <div class="relative mb-3 group/avatar cursor-pointer"
                    onclick="document.getElementById('avatar-input').click()">
                    <img src="img/default-patient.png" alt="Patient Profile" id="sidebar-avatar"
                        class="w-20 h-20 rounded-2xl object-cover shadow-xl border-4 border-white transition-all duration-500 group-hover/avatar:brightness-75">
                    <div
                        class="absolute inset-0 flex items-center justify-center opacity-0 group-hover/avatar:opacity-100 transition-opacity">
                        <i data-lucide="camera" class="w-8 h-8 text-white"></i>
                    </div>
                    <div
                        class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-500 border-4 border-white rounded-full transition-transform duration-500 group-hover/avatar:scale-110">
                    </div>
                </div>
                <!-- ช่องเลือกไฟล์ที่ถูกซ่อนอยู่สำหรับการอัปโหลดรูป (Hidden File Input) -->
                <input type="file" id="avatar-input" class="hidden" accept="image/*"
                    onchange="handleAvatarChange(event)">

                <h3 id="sidebar-user-name" class="font-bold text-slate-900 leading-tight tracking-tight">...</h3>
                <p class="text-xs font-medium text-indigo-500 mt-1 uppercase tracking-wider">ผู้ป่วย (Patient)</p>

                <!-- ปุ่มแก้ไขข้อมูลโปรไฟล์ (Edit Profile Button) -->
                <button onclick="openEditProfile()"
                    class="mt-4 px-4 py-1.5 text-xs font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-full transition-colors flex items-center gap-2">
                    <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                    แก้ไขข้อมูลโปรไฟล์
                </button>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-2 mt-2">
            <button onclick="router.switch('overview'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all active">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="font-medium">ภาพรวมของฉัน</span>
            </button>
            <button onclick="router.switch('appointments'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="font-medium">การนัดหมาย</span>
            </button>
            <button onclick="router.switch('history'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="font-medium">ประวัติการรักษา</span>
            </button>
            <button onclick="router.switch('team'); toggleSidebar(false)"
                class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
                <i data-lucide="stethoscope" class="w-5 h-5"></i>
                <span class="font-medium">ทีมแพทย์ของเรา</span>
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <button onclick="logout()"
                class="flex items-center gap-3 w-full p-3 text-slate-600 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span class="font-medium">ออกจากระบบ</span>
            </button>
        </div>
    </aside>

    <!-- หน้าหลักของผู้ใช้ คนไข้ -->
    <main class="flex-1 flex flex-col min-w-0">
        <header
            class="h-16 glass-nav sticky top-0 z-30 border-b border-slate-200 px-4 lg:px-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="lg:hidden p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 id="view-title" class="text-lg lg:text-xl font-semibold text-slate-800 truncate">สุขภาพของฉัน</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:block text-right">
                    <p id="user-name" class="text-sm font-semibold text-slate-900">กำลังโหลด...</p>
                    <span id="patient-id-badge"
                        class="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-bold uppercase transition-all duration-300">รหัสคนไข้
                        #...</span>
                </div>
                <div class="relative">
                    <img src="img/default-patient.png" alt="Avatar"
                        class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover transition-all duration-300"
                        id="user-avatar">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full">
                    </div>
                </div>
            </div>
        </header>

        <section id="content-area" class="p-6">
            <!-- พื้นที่สำหรับแสดงเนื้อหาที่จะถูกฉีดเข้ามา (Content Injected Here) -->
            <div class="flex items-center justify-center h-full animate-pulse">
                <p class="text-slate-400">กำลังโหลดข้อมูล...</p>
            </div>
        </section>

        <!-- ข้อมูลติดต่อสอบถามแบบลอยตัว (มุมขวาล่าง) -->
        <div class="fixed bottom-6 right-6 z-40 group">
            <div
                class="absolute bottom-full right-0 mb-4 w-72 bg-white rounded-3xl shadow-2xl border border-slate-100 p-6 transform origin-bottom-right scale-0 group-hover:scale-100 opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none group-hover:pointer-events-auto">
                <h4 class="font-black text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="help-circle" class="w-5 h-5 text-indigo-500"></i>
                    ติดต่อสอบถาม
                </h4>
                <div class="space-y-4">
                    <a href="tel:021234567"
                        class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-indigo-50 hover:border-indigo-100 transition-all">
                        <i data-lucide="phone" class="w-4 h-4 text-indigo-600"></i>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">เบอร์โทรศัพท์</p>
                            <p class="text-sm font-bold text-slate-800">027-820-8830</p>
                        </div>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-emerald-50 hover:border-emerald-100 transition-all">
                        <i data-lucide="message-square" class="w-4 h-4 text-emerald-600"></i>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">LINE Official</p>
                            <p class="text-sm font-bold text-slate-800">@ClinicPro</p>
                        </div>
                    </a>
                    <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                        <i data-lucide="map-pin" class="w-4 h-4 text-rose-600"></i>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">ที่ตั้ง</p>
                            <p class="text-xs font-bold text-slate-800">มหาวิทยาลัยเกษตร์ศาสตร์(กำแพงแสน)</p>
                        </div>
                    </div>
                </div>
            </div>

            <button
                class="w-14 h-14 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center hover:bg-indigo-700 hover:scale-110 active:scale-95 transition-all animate-bounce">
                <i data-lucide="message-circle" class="w-6 h-6"></i>
            </button>
        </div>
    </main>

    <!-- สคริปต์ต่างๆ (Scripts) -->
    <script src="../js/api.js"></script>
    <script src="../js/ui-helpers.js"></script>
    <script src="js/patient.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'PATIENT') window.location.href = '../index.html';

        if (user) {
            if (document.getElementById('user-name')) document.getElementById('user-name').textContent = user.fullName;
            if (document.getElementById('sidebar-user-name')) document.getElementById('sidebar-user-name').textContent = user.fullName;

            // จัดการรูปโปรไฟล์ (ถ้ามีไฟล์รูปให้ใช้ ถ้าไม่มีให้ใช้ตัวอักษร)
            const updateAvatar = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    const localPhoto = localStorage.getItem(`profile_photo_${user.id}`);
                    const profileImg = user.profileImage; // ใช้จาก Object User โดยตรง

                    if (profileImg) {
                        el.src = profileImg;
                    } else if (localPhoto) {
                        el.src = localPhoto;
                        el.onerror = () => { localStorage.removeItem(`profile_photo_${user.id}`); updateAvatar(id); };
                    } else {
                        // ถ้าไม่มีรูปเลย ให้สร้างเป็นตัวอักษรแทน
                        const parent = el.parentElement;
                        const initial = user.fullName ? user.fullName[0] : '?';
                        parent.innerHTML = `
                            <div class="${id === 'sidebar-avatar' ? 'w-20 h-20 text-2xl' : 'w-10 h-10 text-base'} rounded-xl bg-indigo-600 text-white flex items-center justify-center font-bold shadow-lg" id="${id}">
                                ${initial}
                            </div>
                        `;
                    }
                }
            };

            updateAvatar('sidebar-avatar');
            updateAvatar('user-avatar');

            // แสดงรหัสคนไข้แบบ 001, 002
            const profileId = user.patientProfileId || 0;
            const formattedId = String(profileId).padStart(3, '0');
            const badge = document.getElementById('patient-id-badge');
            if (badge) badge.textContent = `รหัสคนไข้ #${formattedId}`;
        }

        async function handleAvatarChange(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const img = new Image();
                    img.onload = async () => {
                        // สร้าง Canvas สำหรับย่อขนาดรูป
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 800; // จำกัดขนาดสูงสุด 800px

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // บีบอัดรูปภาพเป็น JPEG คุณภาพ 0.8 เพื่อลดขนาดไฟล์
                        const base64Image = canvas.toDataURL('image/jpeg', 0.8);

                        try {
                            const token = localStorage.getItem('token');
                            await api.auth.updateProfile({ profileImage: base64Image }, token);

                            user.profileImage = base64Image;
                            localStorage.setItem('user', JSON.stringify(user));
                            localStorage.setItem(`profile_photo_${user.id}`, base64Image);

                            const sidebarAvatar = document.getElementById('sidebar-avatar');
                            const headerAvatar = document.getElementById('user-avatar');
                            if (sidebarAvatar) sidebarAvatar.src = base64Image;
                            if (headerAvatar) headerAvatar.src = base64Image;

                            showToast('อัปเดตรูปโปรไฟล์สำเร็จ');
                        } catch (err) {
                            showToast('ไม่สามารถบันทึกรูปภาพได้: ' + err.message, 'error');
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function openEditProfile() {
            showModal(`
                <div class="p-8">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h3 class="text-2xl font-black text-slate-900 tracking-tighter italic uppercase">แก้ไขข้อมูลโปรไฟล์</h3>
                            <p class="text-slate-500 text-sm">อัปเดตข้อมูลของคุณให้เป็นปัจจุบัน</p>
                        </div>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                    </div>
                    
                    <form id="edit-profile-form" class="space-y-4">
                        <div class="space-y-2">
                            <label class="block text-xs font-black text-slate-500 uppercase tracking-widest">ชื่อ-นามสกุล</label>
                            <input type="text" id="edit-fullname" value="${user.fullName}" required class="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-black text-slate-500 uppercase tracking-widest">อีเมล</label>
                            <input type="email" id="edit-email" value="${user.email || ''}" placeholder="example@mail.com" class="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-black text-slate-500 uppercase tracking-widest">เบอร์โทรศัพท์</label>
                            <input type="tel" id="edit-phone" value="${user.phone || ''}" placeholder="08x-xxx-xxxx" class="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
                        </div>
                        
                        <button type="submit" class="w-full btn-indigo text-white py-4 rounded-2xl font-black text-lg mt-6 shadow-xl shadow-indigo-100 flex items-center justify-center gap-2">
                            <i data-lucide="check-circle" class="w-5 h-5"></i>
                            บันทึกการเปลี่ยนแปลง
                        </button>
                    </form>
                </div>
            `);

            document.getElementById('edit-profile-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                try {
                    btn.disabled = true;
                    btn.innerHTML = 'กำลังบันทึก...';

                    const updateData = {
                        fullName: document.getElementById('edit-fullname').value,
                        email: document.getElementById('edit-email').value,
                        phone: document.getElementById('edit-phone').value,
                        patientProfileId: user.patientProfileId
                    };

                    const res = await api.auth.updateProfile(updateData, localStorage.getItem('token'));

                    localStorage.setItem('user', JSON.stringify(res.user));
                    location.reload();
                } catch (err) {
                    showToast(err.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'บันทึกการเปลี่ยนแปลง';
                }
            };
            lucide.createIcons();
        }

        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = typeof force === 'boolean' ? force : sidebar.classList.contains('-translate-x-full');

            if (isOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../index.html';
        }
        lucide.createIcons();
    </script>
</body>

</html>
